name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: macos-latest

    env:
      APP_NAME: Invoker
      DERIVED_DATA_PATH: .build/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify Sparkle signing key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: test -n "$SPARKLE_PRIVATE_KEY"

      - name: Build Release app
        run: |
          xcodebuild build \
            -project Invoker.xcodeproj \
            -scheme "$APP_NAME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign app
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/$APP_NAME.app"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package DMG
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/$APP_NAME.app"
          STAGING_DIR="$RUNNER_TEMP/dmg-staging"
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-${GITHUB_REF_NAME}.dmg"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          SPARKLE_ARTIFACTS_DIR="$DERIVED_DATA_PATH/SourcePackages/artifacts"
          test -d "$SPARKLE_ARTIFACTS_DIR"

          GENERATE_APPCAST="$(find "$SPARKLE_ARTIFACTS_DIR" \
            -path '*/Sparkle/bin/generate_appcast' \
            -type f \
            -print \
            -quit)"
          test -x "$GENERATE_APPCAST"

          UPDATES_DIR="$RUNNER_TEMP/sparkle-updates"
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"
          mkdir -p "$UPDATES_DIR"
          cp "$DMG_PATH" "$UPDATES_DIR/"

          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            -o "$APPCAST_PATH" \
            "$UPDATES_DIR"

          test -s "$APPCAST_PATH"
          xmllint --noout "$APPCAST_PATH"
          grep -Fq 'sparkle:edSignature=' "$APPCAST_PATH"
          grep -Fq 'sparkle-signatures:' "$APPCAST_PATH"
          grep -Fq "<sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>" "$APPCAST_PATH"
          grep -Fq "<sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>" "$APPCAST_PATH"
          grep -Fq "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$DMG_PATH")" "$APPCAST_PATH"

          echo "APPCAST_PATH=$APPCAST_PATH" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$DMG_PATH#$APP_NAME-${GITHUB_REF_NAME}.dmg" \
            "$APPCAST_PATH#appcast.xml" \
            --title "$APP_NAME $GITHUB_REF_NAME" \
            --notes "Ad-hoc signed macOS build. First-time installation may require manual Gatekeeper approval. Existing Sparkle-enabled installations should update from Invoker's in-app Check for Updates command instead of downloading the DMG again."
